<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas Virtuais</title>
    <style>
        /* Variáveis de Cores para facilitar a manutenção */
        :root {
            --bg-color: #121214;
            --card-bg: #202024;
            --text-color: #e1e1e6;
            --primary-color: #8257e5;
            --primary-hover: #9466ff;
            --error-color: #f75a68;
            
            /* Cores dos Jogos */
            --fortnite-color: #0078F2; /* Azul Fortnite */
            --roblox-color: #E33539;   /* Vermelho Roblox */
        }

        /* Reset Básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #a8a8b3;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 2px solid #323238;
            background-color: #121214;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Estilos da caixa de Resultado */
        .resultado {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Escondido por padrão */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .resultado.show {
            display: block;
            opacity: 1;
        }

        .resultado.erro {
            background-color: rgba(247, 90, 104, 0.1);
            border: 1px solid var(--error-color);
            color: var(--error-color);
        }

        .resultado.sucesso {
            background-color: #323238;
            border-left: 5px solid var(--primary-color);
        }

        /* Estilização dinâmica por jogo */
        .resultado.fortnite {
            border-left-color: var(--fortnite-color);
        }
        
        .resultado.fortnite .destaque {
            color: var(--fortnite-color);
        }

        .resultado.roblox {
            border-left-color: var(--roblox-color);
        }

        .resultado.roblox .destaque {
            color: var(--roblox-color);
        }

        .destaque {
            font-size: 1.6rem;
            font-weight: bold;
            display: block;
            margin-top: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Conversor Virtual</h1>
        <p class="subtitle">Descubra quantas moedas seu dinheiro compra!</p>

        <div class="input-group">
            <label for="valorReais">Valor em Reais (R$)</label>
            <input type="number" id="valorReais" placeholder="Ex: 50" min="1" step="0.50">
        </div>

        <div class="input-group">
            <label for="jogoEscolhido">Selecione o Jogo</label>
            <select id="jogoEscolhido">
                <option value="fortnite">Fortnite (V-Bucks)</option>
                <option value="roblox">Roblox (Robux)</option>
            </select>
        </div>

        <button onclick="converterMoedas()">Converter Agora</button>

        <!-- Div onde o resultado ou erro será exibido -->
        <div id="areaResultado" class="resultado"></div>
    </div>

    <script>
        // Função principal chamada ao clicar no botão
        function converterMoedas() {
            // 1. Captura de Dados do Formulário
            const inputReais = document.getElementById('valorReais').value;
            const jogo = document.getElementById('jogoEscolhido').value;
            const areaResultado = document.getElementById('areaResultado');

            // 2. Validação: Verifica se o campo está vazio ou possui valor negativo/zero
            if (inputReais === '' || inputReais <= 0) {
                exibirErro("Por favor, insira um valor em Reais (R$) válido e maior que zero.");
                return;
            }

            // Converte o valor de texto para número decimal (float)
            const reais = parseFloat(inputReais);
            
            // Variáveis para guardar o processamento
            let moedas = 0;
            let nomeMoeda = "";

            // 3. Processamento de Cálculos (Regras de Conversão Fictícias)
            if (jogo === 'fortnite') {
                // Exemplo: R$ 1,00 = 25 V-Bucks
                moedas = reais * 25; 
                nomeMoeda = "V-Bucks";
            } else if (jogo === 'roblox') {
                // Exemplo: R$ 1,00 = 16 Robux
                moedas = reais * 16; 
                nomeMoeda = "Robux";
            }

            // Arredonda para baixo (não existe "meia" moeda nesses jogos)
            moedas = Math.floor(moedas);

            // Formatação do valor em R$ para ficar visualmente agradável (ex: R$ 50,00)
            const valorFormatado = reais.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            // 4. Exibição Dinâmica de Resultados
            exibirSucesso(valorFormatado, moedas, nomeMoeda, jogo);
        }

        // Função auxiliar para exibir mensagens de erro
        function exibirErro(mensagem) {
            const areaResultado = document.getElementById('areaResultado');
            areaResultado.innerHTML = mensagem;
            areaResultado.className = 'resultado erro show'; // Aplica classe de erro
        }

        // Função auxiliar para exibir o resultado com sucesso
        function exibirSucesso(valorReal, moedas, nomeMoeda, jogo) {
            const areaResultado = document.getElementById('areaResultado');
            
            // Monta o HTML interno com os dados da conversão
            areaResultado.innerHTML = `
                Com <strong>${valorReal}</strong> você consegue:
                <span class="destaque">${moedas.toLocaleString('pt-BR')} ${nomeMoeda}</span>
            `;
            
            // Aplica as classes dinamicamente baseadas no jogo para mudar a cor da borda/texto
            areaResultado.className = `resultado sucesso show ${jogo}`;
        }
    </script>

</body>
</html>
